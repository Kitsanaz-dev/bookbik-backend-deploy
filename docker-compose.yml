version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookbik-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/bookbik
    depends_on:
      - mongo
    networks:
      - bookbik-network
    restart: unless-stopped

  mongo:
    image: mongo:7-alpine
    container_name: bookbik-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: bookbik
    volumes:
      - mongo_data:/data/db
    networks:
      - bookbik-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  bookbik-network:
    driver: bridge
